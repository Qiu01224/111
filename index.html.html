<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清新待办 - Minimal To-Do</title>
    <style>
        /* 全局样式与果绿色调定义 */
        :root {
            --bg-color: #f7f9f6;
            --card-color: #ffffff;
            --primary-green: #cddd59;
            --light-green: #f5f1e8;
            --dark-green: #aebe35;
            --text-main: #333333;
            --text-muted: #757575;
            --border-color: #ffdc82;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--dark-green);
            font-weight: 500;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        /* 输入区域设计 */
        .input-section {
            background: var(--card-color);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.06);
            margin-bottom: 25px;
            border: 1px solid rgba(76, 175, 80, 0.1);
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-green);
        }

        /* 隐藏原生文件上传按钮，用好看的 label 代替 */
        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
            background-color: var(--light-green);
            color: var(--dark-green);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .file-label:hover {
            background-color: #c8e6c9;
        }

        input[type="file"] {
            display: none;
        }

        /* 预览上传图片的小方块 */
        .image-preview-container {
            display: none;
            position: relative;
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
            border-radius: 6px;
            overflow: hidden;
        }

        .image-preview-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .img-remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            cursor: pointer;
            line-height: 16px;
            text-align: center;
            padding: 0;
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background-color: var(--dark-green);
        }

        /* 待办列表样式 */
        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .todo-item {
            background: var(--card-color);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            border-left: 4px solid var(--primary-green);
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s;
        }

        .todo-item.completed {
            border-left-color: var(--border-color);
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .todo-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .todo-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .todo-checkbox {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-green);
            cursor: pointer;
        }

        .todo-text {
            font-size: 16px;
            word-break: break-all;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff5252;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: #ffebee;
        }

        /* 任务内插入的照片样式 */
        .todo-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            object-fit: contain;
            align-self: flex-start;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Fresh To-Do</h1>
    </header>

    <div class="input-section">
        <div class="image-preview-container" id="previewContainer">
            <img id="imgPreview" src="" alt="预览">
            <button class="img-remove-btn" onclick="clearImage()">×</button>
        </div>
        
        <div class="input-row">
            <input type="text" id="todoInput" placeholder="添加一个新的待办任务..." autocomplete="off">
            <label class="file-label" for="fileInput" title="插入照片">
                📷 照片
            </label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <button class="add-btn" onclick="addTodo()">添加任务</button>
    </div>

    <ul class="todo-list" id="todoList">
        </ul>
</div>

<script>
    const todoInput = document.getElementById('todoInput');
    const fileInput = document.getElementById('fileInput');
    const previewContainer = document.getElementById('previewContainer');
    const imgPreview = document.getElementById('imgPreview');
    const todoList = document.getElementById('todoList');

    let currentImageDataUrl = '';

    // 监听图片选择
    fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImageDataUrl = e.target.result;
                imgPreview.src = currentImageDataUrl;
                previewContainer.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    // 清除已选图片
    function clearImage() {
        fileInput.value = '';
        currentImageDataUrl = '';
        previewContainer.style.display = 'none';
        imgPreview.src = '';
    }

    // 添加待办任务
    function addTodo() {
        const text = todoInput.value.trim();
        if (text === '' && currentImageDataUrl === '') {
            alert('请输入任务内容或上传照片');
            return;
        }

        // 创建列表元素
        const li = document.createElement('li');
        li.className = 'todo-item';

        // 内部主要结构行（勾选框 + 文字 + 删除按钮）
        const mainDiv = document.createElement('div');
        mainDiv.className = 'todo-main';

        const leftDiv = document.createElement('div');
        leftDiv.className = 'todo-left';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'todo-checkbox';
        checkbox.addEventListener('change', function() {
            if (this.checked) {
                li.classList.add('completed');
            } else {
                li.classList.remove('completed');
            }
        });

        const span = document.createElement('span');
        span.className = 'todo-text';
        span.textContent = text || "未命名图片任务";

        leftDiv.appendChild(checkbox);
        leftDiv.appendChild(span);

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '删除';
        deleteBtn.addEventListener('click', function() {
            li.remove();
        });

        mainDiv.appendChild(leftDiv);
        mainDiv.appendChild(deleteBtn);
        li.appendChild(mainDiv);

        // 如果有照片，插入照片
        if (currentImageDataUrl) {
            const img = document.createElement('img');
            img.src = currentImageDataUrl;
            img.className = 'todo-image';
            // 点击图片可查看大图
            img.addEventListener('click', function() {
                const w = window.open();
                w.document.write(`<img src="${img.src}" style="max-width:100%; max-height:100vh; display:block; margin:auto;">`);
            });
            li.appendChild(img);
        }

        // 置于列表顶部并清空输入框
        todoList.insertBefore(li, todoList.firstChild);
        
        todoInput.value = '';
        clearImage();
    }

    // 支持回车键添加
    todoInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            addTodo();
        }
    });
</script>

</body>
</html>
